# Set prefix to Ctrl-a (instead of Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Speed up response time
set -s escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1 
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Set terminal colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"


bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Better split commands 
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane borders
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=blue

# Status line positioning
set -g status-position bottom
set -g status-justify left

# General status bar colors
set -g status-style bg=black,fg=white

# Left side: Session name 
set -g status-left " #[fg=yellow,bold]#S "
set -g status-left-length 20

# Right side: Date and Time
set -g status-right "#[fg=brightblack]%Y-%m-%d #[fg=white]| #[fg=brightblue,bold]%H:%M "

# Window tabs - Normal
setw -g window-status-style fg=brightblack,bg=black
setw -g window-status-format " #I:#W "

# Window tabs - Active
setw -g window-status-current-style fg=black,bg=green,bold
setw -g window-status-current-format " #I:#W "

# Message/Command Prompt (e.g., when you hit Ctrl-a + :)
set -g message-style bg=yellow,fg=black,bold

set-option -ga terminal-overrides ",*:Tc"

bind e run-shell "tmux new-window 'hx ~/.tmux.conf'"
