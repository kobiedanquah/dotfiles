[main]
# Window geometry
font=Intel One Mono:size=16
terminal=ghostty -e # Replace with your preferred terminal
prompt="▶  "
layer=overlay

# Layout and sizing
lines=15
width=60
horizontal-pad=30
vertical-pad=20
inner-pad=10

# Colors (RGBA format)
[colors]
background=1a1b26ff
text=c0cafcff
match=ff9e64ff
selection=283457ff
selection-text=c0cafcff
border=7aa2f7ff

[border]
width=2
radius=8
