[main]
font=Hack:size=15
hide-before-typing= false
terminal=ghostty -e 
prompt="search: "
layer=overlay
sort-result = true
match-mode = exact
fields = name,generic,comment,categories,filename,keywords
lines=10
width=60
horizontal-pad=30
vertical-pad=20
inner-pad=10

[colors]
background = 1F1F28FF
text = DCD7BAFF
input = DCD7BAFF
match = E46876FF
selection = 2D4F67FF
selection-text = DCD7BAFF
border = 2D4F67FF

[border]
width=2
radius=8
